name: Deploy to Flash-Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-deployer

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: flash-server
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Source profile to ensure npm and pm2 are in the PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "🚀 Deploying EVERYTHING..."

            # 1. Main Application
            echo "--- Processing Main ---"
            cd ~/Development/NextFlowSolutions/main
            git pull origin main
            npm install
            npm run build

            # 2. Client/Legal Application
            echo "--- Processing Legal ---"
            cd ~/Development/NextFlowSolutions/Legal
            git pull origin main
            npm install
            npm run build

            echo "✅ All Systems Deployed!"